name: Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write

env:
  TURBO_TELEMETRY_DISABLED: "1"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: pokermap
  PROJECT_NAME: poker
  WEB_BASE_PATH: /poker
  ADMIN_BASE_PATH: /poker/admin
  PUBLIC_API_URL: https://pargach.ru/poker/api
  PUBLIC_MEDIA_URL: https://pargach.ru/poker/media

jobs:
  # ─── Stage 1: validate (always) ────────────────────────────────────────────
  node:
    name: Node — lint, typecheck, test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  go:
    name: Go — vet, test
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum
      - run: go vet ./...
      - run: go test -race -count=1 ./...

  # ─── Stage 2: build & push (push to main only, after validate) ─────────────
  build:
    name: Build & push ${{ matrix.app }}
    needs: [node, go]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: web
            dockerfile: apps/web/Dockerfile
            base_path: /poker
          - app: admin
            dockerfile: apps/admin/Dockerfile
            base_path: /poker/admin
          - app: api
            dockerfile: apps/api/Dockerfile
            base_path: ""
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase owner
        id: owner
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "value=${OWNER,,}" >> "$GITHUB_OUTPUT"
      - name: Compute tags
        id: tags
        env:
          OWNER: ${{ steps.owner.outputs.value }}
          APP: ${{ matrix.app }}
          SHA: ${{ github.sha }}
        run: |
          IMG="${REGISTRY}/${OWNER}/${IMAGE_PREFIX}-${APP}"
          {
            echo "tags<<EOF"
            echo "${IMG}:latest"
            echo "${IMG}:${SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          build-args: |
            BASE_PATH=${{ matrix.base_path }}
            NEXT_PUBLIC_BASE_PATH=${{ matrix.base_path }}
            NEXT_PUBLIC_API_URL=${{ env.PUBLIC_API_URL }}
            NEXT_PUBLIC_MAP_TILE_URL=${{ vars.NEXT_PUBLIC_MAP_TILE_URL }}
            NEXT_PUBLIC_MAP_ATTRIBUTION=${{ vars.NEXT_PUBLIC_MAP_ATTRIBUTION }}
            NEXT_PUBLIC_DEFAULT_BBOX=${{ vars.NEXT_PUBLIC_DEFAULT_BBOX }}
            NEXT_PUBLIC_APP_NAME=${{ vars.NEXT_PUBLIC_APP_NAME }}
            NEXT_PUBLIC_SUPPORT_TG=${{ vars.NEXT_PUBLIC_SUPPORT_TG }}
            MINIO_PUBLIC_URL=${{ env.PUBLIC_MEDIA_URL }}

  # ─── Stage 3: deploy (push to main only, after build) ──────────────────────
  deploy:
    name: Deploy to VPS
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    environment: production
    env:
      VPS_SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
      VPS_SSH_USER: ${{ secrets.VPS_SSH_USER }}
      VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      SUPERADMIN_PASSWORD: ${{ secrets.SUPERADMIN_PASSWORD }}
      ADMIN_TELEGRAM_IDS: ${{ secrets.ADMIN_TELEGRAM_IDS }}
      MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
      MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
      MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
      MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
      GHCR_USER: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SHA: ${{ github.sha }}
      OWNER_RAW: ${{ github.repository_owner }}
    steps:
      - name: Validate required secrets
        run: |
          : "${VPS_SSH_HOST:?VPS_SSH_HOST required}"
          : "${VPS_SSH_USER:?VPS_SSH_USER required}"
          : "${VPS_SSH_KEY:?VPS_SSH_KEY required}"
          : "${DATABASE_URL:?DATABASE_URL required}"
          : "${REDIS_URL:?REDIS_URL required}"
          : "${JWT_SECRET:?JWT_SECRET required}"
          : "${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN required}"
          echo "all required secrets are set"

      - name: Lowercase owner
        run: echo "OWNER=${OWNER_RAW,,}" >> "$GITHUB_ENV"

      - name: Render .env
        run: |
          {
            echo "PROJECT_NAME=poker"
            echo "ENV=production"
            echo "LOG_LEVEL=info"
            echo "WEB_IMAGE=${REGISTRY}/${OWNER}/${IMAGE_PREFIX}-web:${SHA}"
            echo "ADMIN_IMAGE=${REGISTRY}/${OWNER}/${IMAGE_PREFIX}-admin:${SHA}"
            echo "API_IMAGE=${REGISTRY}/${OWNER}/${IMAGE_PREFIX}-api:${SHA}"
            echo "DATABASE_URL=${DATABASE_URL}"
            echo "REDIS_URL=${REDIS_URL}"
            echo "DATABASE_MAX_CONNS=10"
            echo "CACHE_TTL=60s"
            echo "CACHE_KEY_PREFIX=poker:"
            echo "HTTP_ADDR=:8080"
            echo "CORS_ALLOWED_ORIGINS=https://pargach.ru"
            echo "JWT_SECRET=${JWT_SECRET}"
            echo "JWT_TTL=168h"
            echo "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}"
            echo "SUPERADMIN_USERNAME=admin"
            echo "SUPERADMIN_PASSWORD=${SUPERADMIN_PASSWORD}"
            echo "ADMIN_TELEGRAM_IDS=${ADMIN_TELEGRAM_IDS}"
            echo "MINIO_ENDPOINT=${MINIO_ENDPOINT}"
            echo "MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}"
            echo "MINIO_SECRET_KEY=${MINIO_SECRET_KEY}"
            echo "MINIO_BUCKET=${MINIO_BUCKET}"
            echo "MINIO_PUBLIC_URL=${PUBLIC_MEDIA_URL}"
            echo "MINIO_USE_SSL=false"
            echo "UPLOAD_MAX_SIZE_BYTES=8388608"
            echo "UPLOAD_URL_TTL=5m"
          } > project.env

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 -H "$VPS_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload .env
        run: |
          scp -P "${VPS_SSH_PORT:-22}" -i ~/.ssh/id_ed25519 project.env \
            "${VPS_SSH_USER}@${VPS_SSH_HOST}:/srv/projects/poker/.env.new"

      - name: Pull, restart, health-gate, rollback
        run: |
          ssh -p "${VPS_SSH_PORT:-22}" -i ~/.ssh/id_ed25519 \
            "${VPS_SSH_USER}@${VPS_SSH_HOST}" \
            "GHCR_TOKEN='${GHCR_TOKEN}' GHCR_USER='${GHCR_USER}' SHA='${SHA}' bash -s" <<'REMOTE'
          set -Eeuo pipefail
          cd /srv/projects/poker
          install -m 600 .env.new .env
          rm -f .env.new

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

          docker compose pull
          docker compose up -d --remove-orphans

          ok=1
          for svc in api web admin; do
            for i in $(seq 1 40); do
              state=$(docker inspect --format='{{.State.Health.Status}}' "poker-${svc}" 2>/dev/null || echo "missing")
              if [ "$state" = "healthy" ]; then
                echo "poker-${svc}: healthy"
                break
              fi
              if [ "$i" = "40" ]; then
                echo "poker-${svc}: failed (state=${state})" >&2
                ok=0
              fi
              sleep 3
            done
          done

          ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          prev="$(cat .last-good 2>/dev/null || echo "")"
          if [ "$ok" = "1" ]; then
            printf "%s\tok\t%s\t%s\n" "$ts" "$SHA" "$prev" >> deploys.log
            echo "$SHA" > .last-good
          else
            printf "%s\trolled-back\t%s\t%s\n" "$ts" "$SHA" "$prev" >> deploys.log
            if [ -n "$prev" ]; then
              echo "rolling back to $prev"
              sed -i \
                -e "s|pokermap-web:.*|pokermap-web:${prev}|" \
                -e "s|pokermap-admin:.*|pokermap-admin:${prev}|" \
                -e "s|pokermap-api:.*|pokermap-api:${prev}|" .env
              docker compose pull
              docker compose up -d --remove-orphans
            fi
            exit 1
          fi
          REMOTE
